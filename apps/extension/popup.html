<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarVault Collector</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
    }
    .field {
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .field input,
    .field textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
    }
    .field textarea {
      min-height: 60px;
      resize: vertical;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--accent-hover); }
    button.secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.secondary:hover { background: var(--border); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
    }
    .message.error { color: var(--danger); }
    .count {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
    </svg>
    <h1>StarVault Collector</h1>
  </div>

  <div class="field">
    <label>标题</label>
    <input type="text" id="title" placeholder="页面标题">
  </div>

  <div class="field">
    <label>URL</label>
    <input type="text" id="url" placeholder="https://...">
  </div>

  <div class="field">
    <label>备注（可选）</label>
    <textarea id="notes" placeholder="添加备注..."></textarea>
  </div>

  <div class="field">
    <label>StarVault Web 地址</label>
    <input type="text" id="baseUrl" value="http://localhost:5173" placeholder="http://localhost:5173">
  </div>

  <div class="actions">
    <button id="saveBtn">收藏到 StarVault</button>
    <button id="listBtn" class="secondary">查看列表</button>
  </div>

  <div class="message" id="message"></div>
  <div class="count" id="count"></div>

  <script src="popup.js"></script>
</body>
</html>
